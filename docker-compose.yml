services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pdh
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./chidinh_api
    env_file:
      - ./chidinh_api/.env.example
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/pdh?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./chidinh_client
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
