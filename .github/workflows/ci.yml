name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
    branches: ["main"]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chidinh_client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: chidinh_client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chidinh_api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: goclaw
          POSTGRES_PASSWORD: goclaw
          POSTGRES_DB: goclaw
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U goclaw -d goclaw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: chidinh_api/go.mod
          cache-dependency-path: chidinh_api/go.sum

      - name: Run tests
        env:
          DATABASE_URL: postgresql://goclaw:goclaw@127.0.0.1:5432/goclaw?sslmode=disable
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          DB_USER: goclaw
          DB_PASSWORD: goclaw
          DB_NAME: goclaw
        run: go test ./...

      - name: Build backend
        run: go build ./cmd/api
